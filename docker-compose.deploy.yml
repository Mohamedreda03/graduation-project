services:
  backend:
    build: ./backend
    restart: always
    environment:
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/attendance_system?authSource=admin
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  admin-dashboard:
    build: ./admin-dashboard
    restart: always
    ports:
      - "3001:80"

  doctor-dashboard:
    build: ./doctor-dashboard
    restart: always
    ports:
      - "3002:80"

  mongodb:
    image: mongo:latest
    container_name: attendance-db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: attendance_system
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:

services:
  mongodb:
    image: mongo:latest
    container_name: attendance-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: attendance_system
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
